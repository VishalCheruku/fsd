</head>
<body>
    <div class="top-dashboard-bar">
        <div class="top-dashboard-brand">Society Web System</div>
        <nav class="top-dashboard-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="survey.html">Surveys</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

    <header>

        <div class="logo">Society Web System</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>User Registration</h2>
        <form action="login.html" method="POST">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-group">
                <label for="flat">Flat / House Number</label>
                <input type="text" id="flat" name="flat" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <div class="form-group">
                <label>Resident Type</label>
                <div class="radio-group">
                    <label><input type="radio" name="resident_type" value="Owner" required> Owner</label>
                    <label><input type="radio" name="resident_type" value="Tenant"> Tenant</label>
                </div>
            </div>
            <button type="submit">Register</button>
        </form>
    </main>
</body>
</html>
