<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Practice</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Body */
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;
}

/* Header */
header{
    background:#333;
    color:white;
    padding:20px;
}

/* Navigation */
nav{
    background:#444;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;

    /* Transition */
    transition:0.5s;
}

nav a:hover{
    color:yellow;
    font-size:20px;
}

/* Main Section */
.container{
    padding:40px;
}

@keyframes bounce{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-80px);
    }

    100%{
        transform:translateY(0);
    }
}

/* Cards */
.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:40px;
}

.card{
    width:220px;
    background:white;
    padding:20px;
    border-radius:10px;

    transition:0.5s;
}

.card:hover{
    transform:translateY(-10px);
    background:lightblue;
    box-shadow:0 5px 15px gray;
}

.card h3{
    margin-bottom:10px;
}

.btn{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    background:blue;
    color:white;
    cursor:pointer;

    transition:0.4s;
}

.btn:hover{
    background:rgb(134, 132, 247);
    transform:scale(1.1);
}

.box{
    width:120px;
    height:120px;
    background:black;
    margin:40px auto;

    animation:moveRotate 5s ease-in-out infinite;
}

@keyframes moveRotate{

    0%{
        transform:translateX(-250px) rotate(0deg);
    }

    50%{
        transform:translateX(250px) rotate(360deg);
    }

    100%{
        transform:translateX(-250px) rotate(360deg);
    }
}

@keyframes rotateBox{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
    
}


@media(max-width:768px){

    body{
        background:#dbeafe;
    }

    header{
        background:purple;
    }

    .card{
        width:180px;
    }

}

@media(max-width:480px){

    nav a{
        display:block;
        margin:10px 0;
    }

    .cards{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:90%;
    }

    .box{
        width:80px;
        height:80px;
    }

    h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<header>
    <h1>CSS Demo</h1>
</header>

<div class="container">

    <h2>Animation Example</h2>

    <div class="circle"></div>

    <button class="btn">
        Hover Me
    </button>

    <div class="cards">

        <div class="card">
            <h3>Card 1</h3>
            <p>Transition Effect</p>
        </div>

        <div class="card">
            <h3>Card 2</h3>
            <p>Hover Animation</p>
        </div>

        <div class="card">
            <h3>Card 3</h3>
            <p>Responsive Design</p>
        </div>
    </div>

    <div class="box"></div>

</div>


</body>
</html>
