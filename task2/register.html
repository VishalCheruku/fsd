<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
<div class="container">
<a class="navbar-brand fw-bold text-primary" href="index.html">SkillUp</a>
</div>
</nav>

<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-sm border-0">

<div class="card-body p-5">

<h2 class="text-center mb-4">Course Registration</h2>

<form id="registrationForm">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-3">
<label>Gender</label><br>

<input type="radio" name="gender"> Male
<input type="radio" name="gender" class="ms-3"> Female
</div>

<div class="mb-3">
<label>Select Course</label>

<select class="form-select">

<option>Web Development</option>
<option>Python Programming</option>
<option>Data Science</option>
<option>AI & ML</option>
<option>Java Programming</option>
<option>Cloud Computing</option>

</select>
</div>

<div class="mb-3">
<label>Qualification</label>

<select class="form-select">
<option>B.Tech</option>
<option>Degree</option>
<option>Diploma</option>
<option>MCA</option>
<option>Others</option>
</select>

</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control"></textarea>
</div>

<div class="mb-3">
<label>Upload Resume</label>
<input type="file" class="form-control">
</div>

<div class="form-check mb-4">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">
Accept Terms & Conditions
</label>
</div>

<button class="btn btn-primary w-100">
Register Now
</button>

</form>

<div class="alert alert-success mt-4 d-none" id="successAlert">
Registration Successful! We will contact you shortly.
</div>

</div>
</div>
</div>
</div>
</div>

</section>

<script>
document.getElementById("registrationForm").addEventListener("submit",function(e){
e.preventDefault();
document.getElementById("successAlert").classList.remove("d-none");
this.reset();
});
</script>

</body>
</html>
