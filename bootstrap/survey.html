<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Survey</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

<div class="card shadow">
<div class="card-header bg-primary text-white">
<h3>Society Feedback Survey</h3>
</div>

<div class="card-body">

<form>

<div class="mb-3">
<label>Cleanliness Satisfaction</label>
<select class="form-select">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>

<div class="mb-3">
<label>Security Service Feedback</label><br>

<input type="radio" name="security"> Excellent<br>
<input type="radio" name="security"> Good<br>
<input type="radio" name="security"> Average<br>
<input type="radio" name="security"> Poor
</div>

<div class="mb-3">
<label>Parking Issues</label><br>

<input type="checkbox"> Insufficient Parking<br>
<input type="checkbox"> Unauthorized Parking<br>
<input type="checkbox"> Visitor Parking Issues
</div>

<div class="mb-3">
<label>Water Supply Feedback</label>

<select class="form-select">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>

<div class="mb-3">
<label>Maintenance Quality</label><br>

<input type="radio" name="maintenance"> Excellent<br>
<input type="radio" name="maintenance"> Good<br>
<input type="radio" name="maintenance"> Average<br>
<input type="radio" name="maintenance"> Poor
</div>

<div class="mb-3">
<label>Suggestions</label>
<textarea class="form-control" rows="5"></textarea>
</div>

<button class="btn btn-primary">
Submit Survey
</button>

</form>

</div>
</div>

</div>

</body>
</html>
